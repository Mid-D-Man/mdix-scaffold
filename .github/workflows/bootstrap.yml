name: Bootstrap scaffold repo

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directory structure
        run: mkdir -p .mdix/project_structure .mdix/env/templates scripts bin

      - name: Fetch starter template (skip if exists)
        run: |
          TARGET=".mdix/project_structure/project_structure.mdix"
          if [ -f "$TARGET" ]; then
            echo "exists — skipping: $TARGET"
          else
            curl -fsSL \
              "https://raw.githubusercontent.com/Mid-D-Man/mdix-scaffold/main/.mdix/project_structure/project_structure.mdix" \
              -o "$TARGET"
            echo "fetched: $TARGET"
          fi

      - name: Fetch package.json (skip if exists)
        run: |
          if [ -f "package.json" ]; then
            echo "exists — skipping: package.json"
          else
            curl -fsSL \
              "https://raw.githubusercontent.com/Mid-D-Man/mdix-scaffold/main/package.json" \
              -o "package.json"
            echo "fetched: package.json"
          fi

      - name: Fetch README.md (skip if exists)
        run: |
          if [ -f "README.md" ]; then
            echo "exists — skipping: README.md"
          else
            curl -fsSL \
              "https://raw.githubusercontent.com/Mid-D-Man/mdix-scaffold/main/README.md" \
              -o "README.md"
            echo "fetched: README.md"
          fi

      - name: Create .gitignore (skip if exists)
        run: |
          if [ -f ".gitignore" ]; then
            echo "exists — skipping: .gitignore"
          else
            printf '%s\n' \
              'target/' \
              'dist/' \
              '.env' \
              '*.log' \
              '.DS_Store' \
              '**/.DS_Store' \
              'node_modules/' \
              > .gitignore
            echo "created: .gitignore"
          fi

      - name: Commit bootstrap files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit — already bootstrapped."
          else
            git commit -m "chore: bootstrap scaffold repo [skip ci]"
            git push
          fi
