name: Bootstrap scaffold repo

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create directory structure
        run: |
          mkdir -p .mdix/project_structure
          mkdir -p scripts
          mkdir -p bin

      - name: Write starter template (skip if exists)
        run: |
          TARGET=".mdix/project_structure/project_structure.mdix"
          if [ -f "$TARGET" ]; then
            echo "Template already exists at $TARGET — skipping write."
            exit 0
          fi

          cat > "$TARGET" << 'MDIXEOF'
          // =============================================================================
          // PROJECT SCAFFOLD TEMPLATE  ·  DixScript v1.0.0
          // =============================================================================

          @CONFIG(
            version    -> "1.0.0"
            author     -> "YourName"
            features   -> "quickfuncs,data"
            debug_mode -> "off"
          )

          @QUICKFUNCS(

            ~f<object>(name, ext) {
              return {
                name    = name
                ext     = ext
                content = ""
              }
            }

            ~fc<object>(name, ext, content) {
              return {
                name    = name
                ext     = ext
                content = content
              }
            }

            ~gitkeep<object>() {
              return {
                name    = ".gitkeep"
                ext     = ""
                content = ""
              }
            }

            ~hidden<object>(segment) {
              return {
                segment = segment
              }
            }

            ~delete_file<object>(path) {
              return {
                path = path
              }
            }

            ~rename<object>(src, dst) {
              return {
                from_path = src
                to_path   = dst
              }
            }

            ~update<object>(path, content) {
              return {
                path    = path
                content = content
              }
            }

          )

          @DATA(
            project_name = "my-project"
            description  = "My project description"
            author       = "YourName"

            hidden_dirs::
              hidden("vscode")

            vscode::
              fc("extensions", "json", "{\n  \"recommendations\": []\n}\n")
              fc("settings",   "json", "{\n}\n")

            src::
              fc("main", "rs", "fn main() {\n    println!(\"Hello, world!\");\n}\n")

            src.core::
              f("mod",  "rs")
              f("lib",  "rs")
              f("util", "rs")

            src.models::
              f("mod", "rs")

            tests::
              f("integration", "rs")
              gitkeep()

            docs::
              fc("getting-started", "md", "# Getting started\n\nAdd setup instructions here.\n")
              fc("architecture",    "md", "# Architecture\n\nDescribe the high-level architecture here.\n")

            scripts::
              f("build",  "sh")
              f("deploy", "sh")

            root::
              fc("README",    "md",  "# my-project\n\nMy project description.\n\n## Usage\n\nAdd usage instructions here.\n")
              fc(".gitignore", "",   "target/\ndist/\n.env\n*.log\n.DS_Store\n**/.DS_Store\n")
              fc("Cargo",     "toml","[package]\nname = \"my-project\"\nversion = \"0.1.0\"\nedition = \"2021\"\n")
          )
          MDIXEOF

          echo "Wrote starter template to $TARGET"

      - name: Write README.md (skip if exists)
        run: |
          if [ -f README.md ]; then
            echo "README.md already exists — skipping."
            exit 0
          fi
          cat > README.md << 'EOF'
          # mdix-scaffold

          Declarative project structure generator using DixScript `.mdix` files.

          ## Quickstart

          ### Option A — Node CLI (local)

```bash
          # Install dependencies (none required — zero-dep package)
          node bin/mdix-scaffold.js generate
          node bin/mdix-scaffold.js generate --dry-run
          node bin/mdix-scaffold.js nuke --confirm DELETE
          node bin/mdix-scaffold.js snapshot
```

          ### Option B — GitHub Actions

          1. Edit `.mdix/project_structure/project_structure.mdix`
          2. Push or run **Generate project structure** from the Actions tab
          3. Commit the result

          ## Requirements

          - **mdix CLI** — built from [DixScript-Rust](https://github.com/Mid-D-Man/DixScript-Rust)
          - **Python 3** — for the generation scripts
          - **Node.js ≥ 18** — for the local CLI wrapper

          ## Template operations

          | Operation | Syntax | When it runs |
          |---|---|---|
          | Create stub | `f(name, ext)` | Pass 3 — create |
          | Create with content | `fc(name, ext, content)` | Pass 3 — create |
          | Delete file/dir | `delete_file(path)` | Pass 1 — before creates |
          | Rename file/dir | `rename(src, dst)` | Pass 2 — after deletes |
          | Overwrite content | `update(path, content)` | Pass 4 — after creates |
          EOF
          echo "Wrote README.md"

      - name: Write package.json (skip if exists)
        run: |
          if [ -f package.json ]; then
            echo "package.json already exists — skipping."
            exit 0
          fi
          cat > package.json << 'EOF'
          {
            "name": "mdix-scaffold",
            "version": "1.0.0",
            "description": "Declarative project structure generator using DixScript .mdix files",
            "bin": {
              "mdix-scaffold": "./bin/mdix-scaffold.js"
            },
            "engines": {
              "node": ">=18.0.0"
            },
            "license": "MIT"
          }
          EOF
          echo "Wrote package.json"

      - name: Commit bootstrap files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "Nothing to commit — already bootstrapped."
          else
            git commit -m "chore: bootstrap scaffold repo [skip ci]"
            git push
          fi
