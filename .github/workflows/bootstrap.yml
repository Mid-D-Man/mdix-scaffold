name: Bootstrap scaffold repo

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bootstrap repo files
        run: |
          python3 << 'PYEOF'
import os, json

def write_if_missing(path, content):
    if os.path.exists(path):
        print(f"  exists : {path}")
        return
    os.makedirs(os.path.dirname(path) or ".", exist_ok=True)
    with open(path, "w") as f:
        f.write(content)
    print(f"  wrote  : {path}")

# ── Directories ───────────────────────────────────────────────────────────
for d in [".mdix/project_structure", "scripts", "bin"]:
    os.makedirs(d, exist_ok=True)
    print(f"  mkdir  : {d}")

# ── .mdix/project_structure/project_structure.mdix ───────────────────────
TEMPLATE = r"""// PROJECT SCAFFOLD TEMPLATE · DixScript v1.0.0
// Edit this file to define your project structure.
// Push a change or run: Actions → Generate project structure

@CONFIG(
  version    -> "1.0.0"
  author     -> "YourName"
  features   -> "quickfuncs,data"
  debug_mode -> "off"
)

@QUICKFUNCS(

  ~f<object>(name, ext) {
    return { name = name, ext = ext, content = "" }
  }

  ~fc<object>(name, ext, content) {
    return { name = name, ext = ext, content = content }
  }

  ~gitkeep<object>() {
    return { name = ".gitkeep", ext = "", content = "" }
  }

  ~hidden<object>(segment) {
    return { segment = segment }
  }

  ~delete_file<object>(path) {
    return { path = path }
  }

  ~rename<object>(src, dst) {
    return { from_path = src, to_path = dst }
  }

  ~update<object>(path, content) {
    return { path = path, content = content }
  }

)

@DATA(
  project_name = "my-project"
  description  = "My project description"
  author       = "YourName"

  // Segments listed here get a leading dot on disk (.vscode, .github, etc.)
  hidden_dirs::
    hidden("vscode")

  // ── VS Code ──────────────────────────────────────────────────────────
  vscode::
    fc("extensions", "json", "{\n  \"recommendations\": []\n}\n")
    fc("settings",   "json", "{\n}\n")

  // ── Source ───────────────────────────────────────────────────────────
  src::
    fc("main", "rs", "fn main() {\n    println!(\"Hello, world!\");\n}\n")

  src.core::
    f("mod",  "rs")
    f("lib",  "rs")
    f("util", "rs")

  src.models::
    f("mod", "rs")

  // ── Tests ────────────────────────────────────────────────────────────
  tests::
    f("integration", "rs")
    gitkeep()

  // ── Docs ─────────────────────────────────────────────────────────────
  docs::
    fc("getting-started", "md", "# Getting started\n\nAdd setup instructions here.\n")
    fc("architecture",    "md", "# Architecture\n\nDescribe the high-level design here.\n")

  // ── Scripts ──────────────────────────────────────────────────────────
  scripts::
    f("build",  "sh")
    f("deploy", "sh")

  // ── Root files ───────────────────────────────────────────────────────
  root::
    fc("README",     "md",   "# my-project\n\nMy project description.\n\n## Usage\n\nAdd usage instructions here.\n")
    fc(".gitignore", "",     "target/\ndist/\n.env\n*.log\n.DS_Store\n**/.DS_Store\n")
    fc("Cargo",      "toml", "[package]\nname = \"my-project\"\nversion = \"0.1.0\"\nedition = \"2021\"\n")
)
"""
write_if_missing(".mdix/project_structure/project_structure.mdix", TEMPLATE)

# ── package.json ──────────────────────────────────────────────────────────
PKG = json.dumps({
    "name": "mdix-scaffold",
    "version": "1.0.0",
    "description": "Declarative project structure generator using DixScript .mdix files",
    "keywords": ["scaffold", "project-structure", "dixscript", "mdix", "codegen"],
    "homepage": "https://github.com/Mid-D-Man/mdix-scaffold",
    "repository": {"type": "git", "url": "https://github.com/Mid-D-Man/mdix-scaffold.git"},
    "license": "MIT",
    "bin": {"mdix-scaffold": "./bin/mdix-scaffold.js"},
    "scripts": {
        "generate":          "node bin/mdix-scaffold.js generate",
        "generate:dry":      "node bin/mdix-scaffold.js generate --dry-run",
        "generate:diff":     "node bin/mdix-scaffold.js generate --dry-run --diff",
        "generate:override": "node bin/mdix-scaffold.js generate --override-stubs",
        "nuke":              "node bin/mdix-scaffold.js nuke --confirm DELETE",
        "snapshot":          "node bin/mdix-scaffold.js snapshot",
        "validate":          "node bin/mdix-scaffold.js validate",
        "templates":         "node bin/mdix-scaffold.js templates",
        "test":              "node bin/mdix-scaffold.js --help"
    },
    "engines": {"node": ">=18.0.0"},
    "dependencies": {}
}, indent=2) + "\n"
write_if_missing("package.json", PKG)

# ── .gitignore ────────────────────────────────────────────────────────────
write_if_missing(".gitignore",
    "target/\ndist/\n.env\n*.log\n.DS_Store\n**/.DS_Store\nnode_modules/\n")

# ── README.md ─────────────────────────────────────────────────────────────
README = """\
# mdix-scaffold

Declarative, idempotent project structure generator using
[DixScript](https://github.com/Mid-D-Man/DixScript-Rust) `.mdix` files.

## Quickstart

### Local (Node CLI)

```bash
# Requires: mdix CLI on PATH + Python 3 + Node >= 18
npm run generate           # generate project structure
npm run generate:dry       # preview without writing
npm run generate:diff      # preview with unified diffs
npm run generate:override  # overwrite existing stubs
npm run nuke               # remove all generated files
npm run snapshot           # update others/ProjectStructure.txt
npm run templates          # list available project templates
```

### GitHub Actions

1. Edit `.mdix/project_structure/project_structure.mdix`
2. Push, or run **Actions → Generate project structure**
3. Done — generated files appear in a new commit

## Requirements

- **mdix CLI** — build from [DixScript-Rust](https://github.com/Mid-D-Man/DixScript-Rust)
- **Python 3** — for the generation scripts
- **Node.js ≥ 18** — for the local CLI wrapper

## `.mdix/` layout
