name: Nuke project structure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm removal of all generated files'
        required: true
      template:
        description: 'Path to .mdix template (to know what to remove)'
        required: false
        default: '.mdix/project_structure/project_structure.mdix'

jobs:
  nuke:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Guard — require exact confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DELETE" ]; then
            echo "::error::Confirmation failed. You must type exactly: DELETE"
            exit 1
          fi
          echo "Confirmation accepted. Proceeding with removal."

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get weekly cache key
        id: week
        run: echo "key=$(date -u '+%Y-%U')" >> "$GITHUB_OUTPUT"

      - name: Cache mdix CLI binary
        id: cache-mdix
        uses: actions/cache@v4
        with:
          path: ~/.mdix-bin
          key: mdix-cli-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: mdix-cli-${{ runner.os }}-

      - name: Build mdix CLI (cache miss only)
        if: steps.cache-mdix.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/Mid-D-Man/DixScript-Rust.git /tmp/dixscript
          cd /tmp/dixscript
          cargo build -p mdix-cli --release
          mkdir -p ~/.mdix-bin
          cp target/release/mdix ~/.mdix-bin/mdix

      - name: Install mdix to PATH
        run: sudo cp ~/.mdix-bin/mdix /usr/local/bin/mdix

      - name: Convert template to JSON
        run: |
          TEMPLATE="${{ github.event.inputs.template }}"
          echo "Reading template: $TEMPLATE"
          mdix validate "$TEMPLATE"
          mdix convert "$TEMPLATE" --to json -o /tmp/structure.json

      - name: Remove generated files
        run: |
          python3 << 'PYEOF'
import json, os, re

with open("/tmp/structure.json") as fh:
    data = json.load(fh)

hidden_raw = data.get("hidden_prefix", "")
hidden_set = set(s.strip() for s in hidden_raw.split(",") if s.strip())

def key_to_dir(dotted_key):
    if dotted_key == "root":
        return ""
    parts = dotted_key.split(".")
    fs_parts = []
    for i, part in enumerate(parts):
        fs_parts.append(("." + part) if (i == 0 and part in hidden_set) else part)
    return "/".join(fs_parts)

def assemble_filename(entry):
    name = entry.get("name", "").strip()
    ext  = entry.get("ext",  "").strip()
    if not name:
        return None
    return f"{name}.{ext}" if ext else name

entry_re = re.compile(r'^(.+)\[(\d+)\]$')
dir_groups = {}

for key, value in data.items():
    m = entry_re.match(key)
    if m and isinstance(value, dict) and "name" in value:
        dir_key = m.group(1)
        idx     = int(m.group(2))
        if dir_key not in dir_groups:
            dir_groups[dir_key] = {}
        dir_groups[dir_key][idx] = value

removed = []
missing = []

print("=== Removing files ===\n")

for dir_key in sorted(dir_groups.keys()):
    items    = dir_groups[dir_key]
    dir_path = key_to_dir(dir_key)
    for idx in sorted(items.keys()):
        filename = assemble_filename(items[idx])
        if not filename:
            continue
        filepath = os.path.join(dir_path, filename) if dir_path else filename
        if os.path.exists(filepath):
            os.remove(filepath)
            removed.append(filepath)
            print(f"  DEL  {filepath}")
        else:
            missing.append(filepath)

# Also remove Unity manifest if it exists (special-cased in generator)
unity_manifest = "UnityProject/Packages/manifest.json"
if os.path.exists(unity_manifest):
    os.remove(unity_manifest)
    removed.append(unity_manifest)
    print(f"  DEL  {unity_manifest}")

# Remove empty directories (deepest first to handle nested empties)
dirs_seen = set()
for dir_key in dir_groups.keys():
    dir_path = key_to_dir(dir_key)
    if dir_path:
        # Collect this dir and all parents
        parts = dir_path.split("/")
        for depth in range(len(parts), 0, -1):
            dirs_seen.add("/".join(parts[:depth]))

for dir_path in sorted(dirs_seen, reverse=True):
    if os.path.isdir(dir_path) and not os.listdir(dir_path):
        os.rmdir(dir_path)
        print(f"  RMD  {dir_path}/")

# Remove manifest
manifest_path = ".mdix/.manifest.mdix"
if os.path.exists(manifest_path):
    os.remove(manifest_path)
    print(f"  DEL  {manifest_path}")

# Remove .mdix dir if empty
if os.path.isdir(".mdix") and not os.listdir(".mdix"):
    os.rmdir(".mdix")
    print("  RMD  .mdix/")

print()
print("=" * 44)
print(f"  removed : {len(removed)}")
print(f"  absent  : {len(missing)} (already gone)")
print("=" * 44)
PYEOF

      - name: Show git status
        run: git status --short || true

      - name: Commit removal
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet \
            && echo "Nothing to remove — structure was already clean." \
            || git commit -m "chore: nuke project structure [skip ci]"
          git push
