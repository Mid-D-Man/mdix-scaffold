name: Update project structure

on:
  workflow_dispatch:
    inputs:
      output_file:
        description: 'Output path for the structure snapshot'
        required: false
        default: 'others/ProjectStructure.txt'
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'others/ProjectStructure.txt'
  workflow_call:
    inputs:
      output_file:
        description: 'Output path for the structure snapshot'
        required: false
        type: string
        default: 'others/ProjectStructure.txt'

jobs:
  update-structure:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate project structure snapshot
        env:
          OUTPUT_FILE: ${{ inputs.output_file || 'others/ProjectStructure.txt' }}
        run: |
          python3 scripts/update_structure.py \
            --output "$OUTPUT_FILE" \
            --repo   "${{ github.repository }}" \
            --branch "${{ github.ref_name }}" \
            --commit "${{ github.sha }}"

      - name: Commit snapshot if changed
        env:
          OUTPUT_FILE: ${{ inputs.output_file || 'others/ProjectStructure.txt' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$OUTPUT_FILE"
          if git diff --staged --quiet; then
            echo "Structure unchanged — nothing to commit."
          else
            git commit -m "chore: update project structure snapshot [skip ci]"
            git push
          fi
