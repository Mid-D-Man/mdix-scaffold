name: Generate project structure

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Path to .mdix template (relative to repo root)'
        required: false
        default: '.mdix/project_structure/project_structure.mdix'
      override_stubs:
        description: 'Overwrite existing stub files (true/false)'
        required: false
        default: 'false'
      dry_run:
        description: 'Preview without writing anything (true/false)'
        required: false
        default: 'false'
      file_strategy:
        description: 'How to handle existing files: skip | overwrite | backup | rename'
        required: false
        default: 'skip'
      mappings_file:
        description: 'Path to .mdix mappings file for [[key]] substitution (leave blank to skip)'
        required: false
        default: ''
  push:
    paths:
      - '.mdix/project_structure/**'
  workflow_call:
    inputs:
      template:
        description: 'Path to .mdix template'
        required: false
        type: string
        default: '.mdix/project_structure/project_structure.mdix'
      override_stubs:
        required: false
        type: string
        default: 'false'
      dry_run:
        required: false
        type: string
        default: 'false'
      file_strategy:
        required: false
        type: string
        default: 'skip'
      mappings_file:
        required: false
        type: string
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get weekly cache key
        id: week
        run: echo "key=$(date -u '+%Y-%U')" >> "$GITHUB_OUTPUT"

      - name: Cache mdix CLI binary
        id: cache-mdix
        uses: actions/cache@v4
        with:
          path: ~/.mdix-bin
          key: mdix-cli-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: mdix-cli-${{ runner.os }}-

      - name: Build mdix CLI (cache miss only)
        if: steps.cache-mdix.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — building mdix CLI from source..."
          git clone --depth 1 https://github.com/Mid-D-Man/DixScript-Rust.git /tmp/dixscript
          cd /tmp/dixscript
          cargo build -p mdix-cli --release
          mkdir -p ~/.mdix-bin
          cp target/release/mdix ~/.mdix-bin/mdix
          echo "Build complete."

      - name: Install mdix to PATH
        run: |
          sudo cp ~/.mdix-bin/mdix /usr/local/bin/mdix
          echo "mdix version: $(mdix --version)"

      - name: Resolve generation script
        id: script
        run: |
          if [ -f "scripts/generate_structure.py" ]; then
            echo "path=scripts/generate_structure.py" >> "$GITHUB_OUTPUT"
            echo "Using local script from repo."
          else
            echo "Local script not found — fetching from mdix-scaffold..."
            curl -fsSL \
              "https://raw.githubusercontent.com/Mid-D-Man/mdix-scaffold/main/scripts/generate_structure.py" \
              -o /tmp/generate_structure.py
            echo "path=/tmp/generate_structure.py" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve remote + mappings libs
        run: |
          # Copy lib scripts alongside the generation script if local
          SCRIPT_DIR=$(dirname "${{ steps.script.outputs.path }}")
          for lib in lib_remote.py lib_mappings.py; do
            if [ -f "scripts/$lib" ]; then
              [ "$SCRIPT_DIR" != "scripts" ] && cp "scripts/$lib" "$SCRIPT_DIR/$lib"
            else
              curl -fsSL \
                "https://raw.githubusercontent.com/Mid-D-Man/mdix-scaffold/main/scripts/$lib" \
                -o "$SCRIPT_DIR/$lib"
            fi
          done

      - name: Validate template
        run: |
          TMPL="${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}"
          echo "Validating: $TMPL"
          mdix validate "$TMPL"
          echo "Validation passed."

      - name: Convert template to JSON
        run: |
          TMPL="${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}"
          mdix convert "$TMPL" --to json -o /tmp/structure.json
          echo "Resolved keys:"
          python3 -c "
          import json
          d = json.load(open('/tmp/structure.json'))
          for k in sorted(d.keys()):
              print(f'  {k} = {str(d[k])[:60]}')
          "

      - name: Convert manifest to JSON (if exists)
        run: |
          if [ -f ".mdix/.manifest.mdix" ]; then
            echo "Reading existing manifest..."
            mdix convert .mdix/.manifest.mdix --to json -o /tmp/manifest.json
          else
            echo "No manifest found — first run."
          fi

      - name: Convert mappings to JSON (if provided)
        run: |
          MAPPINGS="${{ inputs.mappings_file || '' }}"
          if [ -n "$MAPPINGS" ] && [ -f "$MAPPINGS" ]; then
            echo "Converting mappings: $MAPPINGS"
            mdix validate "$MAPPINGS"
            # lib_mappings.py will call mdix convert itself — just validate here
            echo "Mappings file validated."
          elif [ -n "$MAPPINGS" ]; then
            echo "::warning::Mappings file specified but not found: $MAPPINGS"
          else
            echo "No mappings file — skipping."
          fi

      - name: Generate project structure
        env:
          TEMPLATE_PATH:  ${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}
          OVERRIDE_STUBS: ${{ inputs.override_stubs || 'false' }}
          DRY_RUN:        ${{ inputs.dry_run || 'false' }}
          FILE_STRATEGY:  ${{ inputs.file_strategy || 'skip' }}
          STRUCTURE_JSON: /tmp/structure.json
          MANIFEST_JSON:  /tmp/manifest.json
          MAPPINGS_FILE:  ${{ inputs.mappings_file || '' }}
        run: python3 ${{ steps.script.outputs.path }}

      - name: Show git status
        if: ${{ inputs.dry_run != 'true' }}
        run: git status --short || true

      - name: Commit generated structure
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet \
            && echo "Nothing new to commit — structure is up to date." \
            || git commit -m "chore: sync project structure from template [skip ci]"
          git push
