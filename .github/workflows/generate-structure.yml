name: Generate project structure

on:
  workflow_dispatch:
    inputs:
      template:
        description: 'Path to .mdix template (relative to repo root)'
        required: false
        default: '.mdix/project_structure/project_structure.mdix'
      override_stubs:
        description: 'Overwrite existing stub files (true/false)'
        required: false
        default: 'false'
      dry_run:
        description: 'Preview without writing anything (true/false)'
        required: false
        default: 'false'
  push:
    paths:
      - '.mdix/project_structure/**'
  workflow_call:
    inputs:
      template:
        description: 'Path to .mdix template'
        required: false
        type: string
        default: '.mdix/project_structure/project_structure.mdix'
      override_stubs:
        required: false
        type: string
        default: 'false'
      dry_run:
        required: false
        type: string
        default: 'false'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # workflows: write is intentionally omitted.
      #
      # GITHUB_TOKEN can only hold this scope when the repo has
      # "Read and write permissions" enabled AND the checkout token
      # has the OAuth workflows scope — which requires a PAT.
      #
      # Option A (recommended): keep github.workflows:: entries OUT of
      #   your .mdix template. The scaffold does not need to generate
      #   workflow files to function correctly.
      #
      # Option B (advanced): create a fine-grained PAT with
      #   contents:write + workflows:write, store it as
      #   secrets.WORKFLOW_RW_TOKEN, then add to the checkout step:
      #     with:
      #       token: ${{ secrets.WORKFLOW_RW_TOKEN }}
      #   and restore this line:
      #     workflows: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Get weekly cache key
        id: week
        run: echo "key=$(date -u '+%Y-%U')" >> "$GITHUB_OUTPUT"

      - name: Cache mdix CLI binary
        id: cache-mdix
        uses: actions/cache@v4
        with:
          path: ~/.mdix-bin
          key: mdix-cli-${{ runner.os }}-${{ steps.week.outputs.key }}
          restore-keys: mdix-cli-${{ runner.os }}-

      - name: Build mdix CLI (cache miss only)
        if: steps.cache-mdix.outputs.cache-hit != 'true'
        run: |
          echo "Cache miss — building mdix CLI from source..."
          git clone --depth 1 https://github.com/Mid-D-Man/DixScript-Rust.git /tmp/dixscript
          cd /tmp/dixscript
          cargo build -p mdix-cli --release
          mkdir -p ~/.mdix-bin
          cp target/release/mdix ~/.mdix-bin/mdix
          echo "Build complete."

      - name: Install mdix to PATH
        run: |
          sudo cp ~/.mdix-bin/mdix /usr/local/bin/mdix
          echo "mdix version: $(mdix --version)"

      - name: Validate template
        run: |
          TEMPLATE="${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}"
          echo "Validating: $TEMPLATE"
          mdix validate "$TEMPLATE"
          echo "Validation passed."

      - name: Convert template to JSON
        run: |
          TEMPLATE="${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}"
          mdix convert "$TEMPLATE" --to json -o /tmp/structure.json
          echo "Resolved keys:"
          python3 -c "import json; d=json.load(open('/tmp/structure.json')); [print(f'  {k} = {str(d[k])[:60]}') for k in sorted(d.keys())]"

      - name: Convert manifest to JSON (if exists)
        run: |
          if [ -f .mdix/.manifest.mdix ]; then
            echo "Reading existing manifest..."
            mdix convert .mdix/.manifest.mdix --to json -o /tmp/manifest.json
          else
            echo "No manifest found — first run."
          fi

      - name: Generate project structure
        env:
          OVERRIDE_STUBS: ${{ inputs.override_stubs || 'false' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          TEMPLATE_PATH: ${{ inputs.template || '.mdix/project_structure/project_structure.mdix' }}
        run: |
          python3 << 'PYEOF'
          import json, os, re, sys, hashlib, shutil
          from datetime import datetime, timezone

          override_stubs = os.environ.get("OVERRIDE_STUBS", "false").lower() == "true"
          dry_run        = os.environ.get("DRY_RUN",        "false").lower() == "true"
          template_path  = os.environ.get("TEMPLATE_PATH",  ".mdix/project_structure/project_structure.mdix")

          if dry_run:
              print("=" * 56)
              print("  DRY RUN — no files will be written or deleted")
              print("=" * 56)
              print()

          with open("/tmp/structure.json") as fh:
              data = json.load(fh)

          # ── Resolve hidden-dir segments ───────────────────────────────────
          hidden_set = set()
          i = 0
          while True:
              key = f"hidden_dirs[{i}]"
              if key not in data:
                  break
              entry = data[key]
              if isinstance(entry, dict) and "segment" in entry:
                  hidden_set.add(entry["segment"].strip())
              i += 1

          project_name = data.get("project_name", "unknown-project")
          description  = data.get("description",  "")

          print(f"Project    : {project_name}")
          print(f"Hidden     : {hidden_set or '(none)'}")
          print(f"Dry run    : {dry_run}")
          print(f"Override   : {override_stubs}")
          print()

          # ── Load manifest (previous run tracking) ─────────────────────────
          previously_created = set()
          if os.path.exists("/tmp/manifest.json"):
              with open("/tmp/manifest.json") as fh:
                  mdata = json.load(fh)
              j = 0
              while f"created_files[{j}]" in mdata:
                  val = mdata[f"created_files[{j}]"]
                  if isinstance(val, str):
                      previously_created.add(val)
                  j += 1
              print(f"Manifest   : {len(previously_created)} previously tracked file(s)")
              print()

          # ── Helpers ───────────────────────────────────────────────────────
          def key_to_dir(dotted_key):
              if dotted_key == "root":
                  return ""
              parts = dotted_key.split(".")
              fs_parts = []
              for idx, part in enumerate(parts):
                  if idx == 0 and part in hidden_set:
                      fs_parts.append("." + part)
                  else:
                      fs_parts.append(part)
              return "/".join(fs_parts)

          def assemble_filename(entry):
              name = entry.get("name", "").strip()
              ext  = entry.get("ext",  "").strip()
              if not name:
                  return None
              return f"{name}.{ext}" if ext else name

          # ── Built-in stub content by extension ────────────────────────────
          STUB_DEFAULTS = {
              "rs":     "// Auto-generated stub\n",
              "cs":     "// Auto-generated stub\n",
              "py":     "# Auto-generated stub\n",
              "ts":     "// Auto-generated stub\n",
              "js":     "// Auto-generated stub\n",
              "go":     "// Auto-generated stub\n",
              "java":   "// Auto-generated stub\n",
              "cpp":    "// Auto-generated stub\n",
              "c":      "// Auto-generated stub\n",
              "h":      "// Auto-generated stub\n",
              "hpp":    "// Auto-generated stub\n",
              "kt":     "// Auto-generated stub\n",
              "swift":  "// Auto-generated stub\n",
              "lua":    "-- Auto-generated stub\n",
              "shader": "// Auto-generated shader stub\n",
              "yml":    "# Auto-generated stub\n",
              "yaml":   "# Auto-generated stub\n",
              "sh":     "#!/usr/bin/env bash\nset -euo pipefail\n\n# Auto-generated stub\n",
              "bash":   "#!/usr/bin/env bash\nset -euo pipefail\n\n# Auto-generated stub\n",
              "ps1":    "# Auto-generated stub\n",
              "toml":   "# Auto-generated config\n",
              "json":   "{}\n",
              "md":     "# {name}\n",
              "xml":    "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n",
              "html":   "<!DOCTYPE html>\n<html>\n<head><title>{name}</title></head>\n<body>\n</body>\n</html>\n",
              "css":    "/* Auto-generated stub */\n",
          }

          # ── Reserved group-array prefixes (never treated as dir groups) ───
          RESERVED_PREFIXES = {
              "hidden_dirs",
              "delete_files",
              "rename_files",
              "update_files",
          }

          # ── Collect directory groups from template JSON ───────────────────
          entry_re   = re.compile(r'^(.+)\[(\d+)\]$')
          dir_groups = {}

          for key, value in data.items():
              m = entry_re.match(key)
              if not m:
                  continue
              if not isinstance(value, dict) or "name" not in value:
                  continue
              dir_key = m.group(1)
              if dir_key in RESERVED_PREFIXES:
                  continue
              idx = int(m.group(2))
              if dir_key not in dir_groups:
                  dir_groups[dir_key] = {}
              dir_groups[dir_key][idx] = value

          print(f"Template defines {len(dir_groups)} directory group(s)")

          # ──────────────────────────────────────────────────────────────────
          # PASS 1 — Delete files / directories
          # Runs before creates so a rename-then-recreate pattern works cleanly.
          # ──────────────────────────────────────────────────────────────────
          deleted = []
          section_header_printed = False
          i = 0
          while True:
              key = f"delete_files[{i}]"
              if key not in data:
                  break
              entry = data[key]
              if isinstance(entry, dict) and "path" in entry:
                  path = entry["path"].strip()
                  if path:
                      if not section_header_printed:
                          print()
                          print("=== Deleting files / directories ===")
                          print()
                          section_header_printed = True
                      if os.path.exists(path):
                          if not dry_run:
                              if os.path.isdir(path):
                                  shutil.rmtree(path)
                              else:
                                  os.remove(path)
                          deleted.append(path)
                          print(f"  DEL  {path}")
                      else:
                          print(f"  ---  {path}  (not found, skipped)")
              i += 1

          # ──────────────────────────────────────────────────────────────────
          # PASS 2 — Rename files / directories
          # ──────────────────────────────────────────────────────────────────
          renamed = []          # list of (from_path, to_path)
          section_header_printed = False
          i = 0
          while True:
              key = f"rename_files[{i}]"
              if key not in data:
                  break
              entry = data[key]
              if isinstance(entry, dict) and "from_path" in entry and "to_path" in entry:
                  from_path = entry["from_path"].strip()
                  to_path   = entry["to_path"].strip()
                  if from_path and to_path:
                      if not section_header_printed:
                          print()
                          print("=== Renaming files / directories ===")
                          print()
                          section_header_printed = True
                      if os.path.exists(from_path):
                          if not dry_run:
                              parent = os.path.dirname(to_path)
                              if parent:
                                  os.makedirs(parent, exist_ok=True)
                              os.rename(from_path, to_path)
                          renamed.append((from_path, to_path))
                          print(f"  REN  {from_path} → {to_path}")
                      else:
                          print(f"  ---  {from_path}  (not found, skipped)")
              i += 1

          # ──────────────────────────────────────────────────────────────────
          # PASS 3 — Create / skip / override scaffold files
          # ──────────────────────────────────────────────────────────────────
          created    = []
          skipped    = []
          overridden = []

          print()
          print("=== Processing scaffold files ===")
          print()

          for dir_key in sorted(dir_groups.keys()):
              items    = dir_groups[dir_key]
              dir_path = key_to_dir(dir_key)

              if dir_path and not os.path.isdir(dir_path):
                  if not dry_run:
                      os.makedirs(dir_path, exist_ok=True)
                  print(f"  DIR  {dir_path}/")

              for idx in sorted(items.keys()):
                  entry    = items[idx]
                  filename = assemble_filename(entry)
                  if not filename:
                      continue

                  name_part   = entry.get("name", "")
                  ext_part    = entry.get("ext",  "")
                  raw_content = entry.get("content", "")

                  if raw_content == "":
                      raw_content = STUB_DEFAULTS.get(ext_part, "").replace("{name}", name_part)

                  filepath = os.path.join(dir_path, filename) if dir_path else filename

                  if os.path.exists(filepath):
                      if override_stubs:
                          if not dry_run:
                              with open(filepath, "w") as fh:
                                  fh.write(raw_content)
                          overridden.append(filepath)
                          print(f"  OVR  {filepath}")
                      else:
                          skipped.append(filepath)
                          print(f"  ---  {filepath}  (exists, kept)")
                  else:
                      if not dry_run:
                          parent = os.path.dirname(filepath)
                          if parent:
                              os.makedirs(parent, exist_ok=True)
                          with open(filepath, "w") as fh:
                              fh.write(raw_content)
                      created.append(filepath)
                      print(f"  NEW  {filepath}")

          # ──────────────────────────────────────────────────────────────────
          # PASS 4 — Update file contents (always-overwrite)
          # ──────────────────────────────────────────────────────────────────
          updated = []
          section_header_printed = False
          i = 0
          while True:
              key = f"update_files[{i}]"
              if key not in data:
                  break
              entry = data[key]
              if isinstance(entry, dict) and "path" in entry:
                  file_path   = entry["path"].strip()
                  new_content = entry.get("content", "")
                  if file_path:
                      if not section_header_printed:
                          print()
                          print("=== Updating file contents ===")
                          print()
                          section_header_printed = True
                      existed_before = os.path.exists(file_path)
                      if not dry_run:
                          parent = os.path.dirname(file_path)
                          if parent:
                              os.makedirs(parent, exist_ok=True)
                          with open(file_path, "w") as fh:
                              fh.write(new_content)
                      updated.append(file_path)
                      label = "UPD" if existed_before else "NEW"
                      print(f"  {label}  {file_path}")
              i += 1

          # ──────────────────────────────────────────────────────────────────
          # Write manifest
          # Starts from previously tracked set, applies all mutations:
          #   + created, overridden, updated (new files)
          #   - deleted
          #   rename: old path → new path
          # ──────────────────────────────────────────────────────────────────
          if not dry_run:
              os.makedirs(".mdix", exist_ok=True)

              template_hash = ""
              if os.path.exists(template_path):
                  with open(template_path, "rb") as tf:
                      template_hash = hashlib.sha256(tf.read()).hexdigest()[:12]

              all_tracked = previously_created | set(created) | set(overridden) | set(updated)
              all_tracked -= set(deleted)
              for from_p, to_p in renamed:
                  all_tracked.discard(from_p)
                  all_tracked.add(to_p)
              all_tracked = sorted(all_tracked)

              files_block = "\n    ".join(f'"{p}"' for p in all_tracked) if all_tracked else '"(none)"'
              now = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

              manifest_content = (
                  "@CONFIG(\n"
                  f'  version    -> "1.0.0"\n'
                  f'  generated  -> "{now}"\n'
                  f'  features   -> "data"\n'
                  f'  debug_mode -> "off"\n'
                  ")\n\n"
                  "@DATA(\n"
                  f'  template      = "{template_path}"\n'
                  f'  template_hash = "{template_hash}"\n'
                  f'  last_run      = "{now}"\n'
                  f'  new_this_run  = {len(created)}\n'
                  f'  overridden    = {len(overridden)}\n'
                  f'  skipped       = {len(skipped)}\n'
                  f'  deleted       = {len(deleted)}\n'
                  f'  renamed       = {len(renamed)}\n'
                  f'  updated       = {len(updated)}\n'
                  "\n"
                  "  created_files::\n"
                  f"    {files_block}\n"
                  ")\n"
              )

              with open(".mdix/.manifest.mdix", "w") as mf:
                  mf.write(manifest_content)
              print()
              print(f"  Manifest → .mdix/.manifest.mdix  (tracking {len(all_tracked)} file(s))")

          print()
          print("=" * 56)
          print(f"  created   : {len(created)}")
          print(f"  overridden: {len(overridden)}")
          print(f"  skipped   : {len(skipped)}")
          print(f"  deleted   : {len(deleted)}")
          print(f"  renamed   : {len(renamed)}")
          print(f"  updated   : {len(updated)}")
          print("=" * 56)

          if dry_run:
              print()
              print("DRY RUN complete — re-run with dry_run=false to apply.")
          PYEOF

      - name: Show git status
        if: ${{ inputs.dry_run != 'true' }}
        run: git status --short || true

      - name: Commit generated structure
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet \
            && echo "Nothing new to commit — structure is already up to date." \
            || git commit -m "chore: sync project structure from template [skip ci]"
          git push
